pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: bun run lint:staged -- {staged_files}
      stage_fixed: true
    format:
      glob: "*.{js,ts,jsx,tsx,json}"
      run: bun run fmt:staged -- {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bun run commitlint -- --edit {1}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun test
