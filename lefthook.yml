pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: bash -c '[[ -z "{staged_files}" ]] || bunx oxlint --fix {staged_files}'
      stage_fixed: true
    format:
      glob: "*.{js,ts,jsx,tsx,json,md}"
      run: bash -c '[[ -z "{staged_files}" ]] || bunx oxfmt {staged_files}'
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun test
